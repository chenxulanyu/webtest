<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的网站</title>
<script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
<style>
  :root { --bg: #fafafa; --card-bg: #fff; --text: #2c2c2c; --text-secondary: #666; --border: #e5e5e5; --shadow: 0 1px 3px rgba(0,0,0,.06); --radius: 12px; --max-w: 720px; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; min-height: 100vh; }
  .navbar { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 14px 20px; text-align: center; position: sticky; top: 0; z-index: 10; }
  .navbar .title { font-size: 1.1rem; font-weight: 600; }
  .container { max-width: var(--max-w); margin: 0 auto; padding: 32px 20px 60px; }
  .block-text { background: var(--card-bg); border-radius: var(--radius); padding: 24px 28px; box-shadow: var(--shadow); font-size: 1.05rem; white-space: pre-wrap; word-break: break-word; line-height: 1.9; margin-bottom: 28px; }
  .block-image { background: var(--card-bg); border-radius: var(--radius); padding: 12px; box-shadow: var(--shadow); margin-bottom: 28px; }
  .block-image img { display: block; width: 100%; height: auto; border-radius: 8px; }
  .block-image .alt-text { display: block; text-align: center; color: var(--text-secondary); font-size: .85rem; margin-top: 8px; }
  .loading, .empty, .error { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
  .loading .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #dc2626; }
  .error button { margin-top: 16px; padding: 10px 24px; border: none; background: #3b82f6; color: #fff; border-radius: 8px; cursor: pointer; font-size: .95rem; }
  .update-time { text-align: center; color: #aaa; font-size: .78rem; margin-top: 40px; }
  @media (max-width: 768px) { .container { padding: 20px 14px 50px; } .block-text { padding: 18px 16px; font-size: 1rem; } .block-image { padding: 8px; } }
</style>
</head>
<body>
<div class="navbar"><span class="title">我的网站</span></div>
<div class="container" id="content"></div>
<script>
const ENV_ID = 'webtest-d1g5ir6tl69366b35';
const COLLECTION = 'webtest_data';
const CACHE_KEY = 'webtest_data_cache';
const container = document.getElementById('content');
let db = null;

function showLoading() { container.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>'; }
function showEmpty() { container.innerHTML = '<div class="empty"><p>📭 暂无内容</p></div>'; }
function showError(msg) { container.innerHTML = '<div class="error"><p>❌ '+msg+'</p><button onclick="loadContent()">重新加载</button></div>'; }
function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function renderBlock(block) {
  if (block.type === 'text') return '<div class="block block-text">'+escapeHtml(block.content)+'</div>';
  if (block.type === 'image') {
    const alt = block.alt ? '<span class="alt-text">'+escapeHtml(block.alt)+'</span>' : '';
    return '<div class="block block-image"><img src="'+escapeHtml(block.src)+'" alt="'+escapeHtml(block.alt||'')+'" loading="lazy">'+alt+'</div>';
  }
  return '';
}

function renderContent(content) {
  if (!content || !content.blocks || content.blocks.length === 0) { showEmpty(); return; }
  let html = content.blocks.map(renderBlock).join('');
  if (content.updatedAt) html += '<div class="update-time">最后更新：'+new Date(content.updatedAt).toLocaleString('zh-CN')+'</div>';
  container.innerHTML = html;
}

async function initCloudBase() {
  const app = cloudbase.init({ env: ENV_ID });
  const auth = app.auth({ persistence: 'local' });
  await auth.anonymousAuthProvider().signIn();
  db = app.database();
}

async function loadContent() {
  let cached = null;
  try { const r = localStorage.getItem(CACHE_KEY); if (r) cached = JSON.parse(r); } catch (e) {}
  if (cached && cached._v) { renderContent(cached); } else { showLoading(); try { localStorage.removeItem(CACHE_KEY); } catch (e) {} }

  try {
    if (!db) await initCloudBase();
    const res = await db.collection(COLLECTION).where({published: true}).orderBy('updatedAt', 'desc').limit(1).get();
    const latest = res.data && res.data.length > 0 ? res.data[0] : null;
    if (latest) {
      latest._v = 1;
      if (!cached || !cached._v || latest.updatedAt !== cached.updatedAt) {
        renderContent(latest);
        try { localStorage.setItem(CACHE_KEY, JSON.stringify(latest)); } catch (e) {}
      }
    } else { showEmpty(); }
  } catch (err) {
    const msg = err.message || err.code || JSON.stringify(err) || '未知错误';
    console.error('CloudBase:', err);
    if (!cached || !cached._v) showError(msg);
  }
}
loadContent();
</script>
</body>
</html>
